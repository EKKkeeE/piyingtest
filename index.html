<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>手势皮影 · 孙悟空</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div id="app">
      <div id="stage" class="stage" aria-hidden="true"></div>

      <div id="stage-interaction" class="stage-interaction" aria-hidden="true">
        <canvas id="string-canvas"></canvas>
      </div>

      <div id="enemy-layer" class="enemy-layer" aria-hidden="true"></div>

      <div id="puppet-mount-player" class="puppet-mount"></div>
      <div id="puppet-mount-boss" class="puppet-mount boss-mount" hidden></div>

      <div id="boss-intro-layer" class="boss-intro-layer" aria-hidden="true" hidden>
        <div class="boss-intro-vignette"></div>
        <div class="boss-intro-sigil"></div>
        <div class="boss-intro-strings">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
        </div>
        <div class="boss-intro-bone-shadow"></div>
        <div class="boss-intro-shockwave"></div>
      </div>

      <div id="combo-frame-layer" class="combo-frame-layer" aria-hidden="true">
        <img id="combo-frame-img" alt="" draggable="false" />
      </div>

      <div id="ultimate-frame-layer" class="ultimate-frame-layer" aria-hidden="true">
        <img id="ultimate-frame-img" alt="" draggable="false" />
      </div>

      <canvas id="staff-glow-canvas" class="staff-glow-canvas" aria-hidden="true"></canvas>

      <div id="projectile-layer" class="projectile-layer" aria-hidden="true"></div>

      <div id="ultimate-flash" class="ultimate-flash" aria-hidden="true">
        <div class="ultimate-flash-wash"></div>
        <div class="ultimate-flash-sigil"></div>
        <div class="ultimate-flash-sigil ultimate-flash-sigil-2"></div>
        <div class="ultimate-flash-rays"></div>
        <div class="ultimate-flash-slash ultimate-flash-slash-1"></div>
        <div class="ultimate-flash-slash ultimate-flash-slash-2"></div>
        <div class="ultimate-flash-core"></div>
        <div class="ultimate-flash-ring ultimate-flash-ring-1"></div>
        <div class="ultimate-flash-ring ultimate-flash-ring-2"></div>
        <div class="ultimate-flash-ring ultimate-flash-ring-3"></div>
        <div class="ultimate-flash-ring ultimate-flash-ring-4"></div>
        <div class="ultimate-flash-sparks"></div>
        <div class="ultimate-flash-embers"></div>
      </div>

      <div id="battle-hud" class="battle-hud" hidden>
        <div class="player-hud-block">
          <div class="hp-bar hp-bar-player">
            <span class="hp-label">孙悟空</span>
            <div class="hp-track">
              <div id="player-hp-fill" class="hp-fill"></div>
            </div>
          </div>
          <div class="golden-pills" id="golden-pills" aria-label="金丹">
            <span class="pills-label">金丹</span>
            <div class="pills-slots">
              <span class="pill-slot" data-slot="0"><span class="pill-shine"></span></span>
              <span class="pill-slot" data-slot="1"><span class="pill-shine"></span></span>
              <span class="pill-slot" data-slot="2"><span class="pill-shine"></span></span>
            </div>
          </div>
        </div>
        <div class="boss-hud-block" hidden>
          <div class="hp-bar hp-bar-boss">
            <div class="hp-track">
              <div id="boss-hp-fill" class="hp-fill hp-fill-boss"></div>
            </div>
            <span class="hp-label">白骨精</span>
          </div>
          <div class="boss-hud-spacer" aria-hidden="true"></div>
        </div>
      </div>

      <div id="stage-curtain" class="stage-curtain" aria-hidden="true"></div>

      <div id="camera-panel" class="camera-panel">
        <video id="camera" playsinline muted autoplay></video>
        <canvas id="debug-canvas" class="debug-canvas"></canvas>
      </div>

      <!-- DEV: 上线前删除 -->
      <button
        id="dev-boss-skip-btn"
        type="button"
        class="dev-boss-skip-btn"
        hidden
        aria-pressed="false"
      >
        调试：直进 Boss
      </button>

      <div id="result-overlay" class="result-overlay" hidden>
        <canvas id="result-particles" class="result-particles" aria-hidden="true"></canvas>
        <div class="result-card puppet-frame">
          <div id="result-victory-text" class="result-victory-text" hidden>
            <h2 class="result-main-title">演出完美结束！</h2>
            <p class="result-subtitle">
              恭喜获得称号：<span class="result-title-badge">金牌皮影演绎家</span>！
            </p>
          </div>
          <div id="result-defeat-text" class="result-defeat-text" hidden>
            <p class="result-subtitle">悟空败下阵来，皮影戏台归于沉寂……</p>
          </div>
          <h2 id="result-title">白骨精胜</h2>
          <button id="restart-btn" type="button">再试一次</button>
        </div>
      </div>

      <div id="start-overlay" class="start-overlay">
        <div class="start-card puppet-frame">
          <div class="start-card-header">
            <span class="start-card-ornament" aria-hidden="true"></span>
            <h1>手势皮影 · 孙悟空</h1>
          </div>
          <p class="tips">利用<strong>比耶</strong>攻击，<strong>OK</strong>释放大招</p>
          <button id="start-btn" type="button">举起左手，开始演出</button>
          <p id="error-box" class="error-box" hidden></p>
        </div>
      </div>
    </div>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
